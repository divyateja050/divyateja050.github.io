<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Archive | Yekkaluru Divya Teja</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CORE RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; min-height: 100vh; display: flex; justify-content: center; background-image: radial-gradient(circle at top center, #1e293b, #0f172a); background-attachment: fixed; }
        .glow { position: fixed; width: 800px; height: 800px; background: radial-gradient(circle, rgba(56, 189, 248, 0.03) 0%, rgba(15, 23, 42, 0) 60%); top: 0; left: 50%; transform: translateX(-50%); z-index: 0; pointer-events: none; }
        .container { width: 100%; max-width: 1000px; padding: 60px 20px; z-index: 1; }
        .header { text-align: left; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .header h1 { font-size: 2.2rem; font-weight: 700; margin: 0 0 8px 0; color: #ffffff; }
        .header p { font-size: 1rem; color: #94a3b8; font-weight: 400; }
        .secret-name { cursor: text; user-select: none; }

        /* TIMELINE */
        .timeline { position: relative; padding-left: 40px; }
        .timeline::before { content: ''; position: absolute; top: 0; bottom: 0; left: 11px; width: 2px; background: linear-gradient(to bottom, rgba(56, 189, 248, 0.5), rgba(255, 255, 255, 0.05) 90%); }
        .timeline-item { position: relative; margin-bottom: 20px; animation: fadeInUp 0.5s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .timeline-marker { position: absolute; left: -37px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; border-radius: 50%; background-color: #0f172a; border: 2px solid #38bdf8; box-shadow: 0 0 0 4px rgba(15, 23, 42, 1); z-index: 2; }
        
        /* CARD */
        .card { background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); transition: 0.2s; }
        .card:hover { border-color: rgba(56, 189, 248, 0.3); background: rgba(30, 41, 59, 0.9); }
        .date-tag { font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
        .card h2 { font-size: 1.1rem; font-weight: 600; color: #f8fafc; margin: 0; }
        
        /* BUTTONS */
        .action-group { display: flex; gap: 10px; }
        .btn { padding: 8px 16px; border-radius: 5px; font-size: 0.85rem; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; color: white; transition: 0.2s; }
        .btn-primary { background: #0ea5e9; }
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.2); }

        /* ADMIN MODAL */
        #admin-modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .admin-box { background: #1e293b; border: 1px solid #38bdf8; padding: 30px; border-radius: 15px; width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }
        label { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 5px; text-transform: uppercase; }
        .admin-input { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 5px; margin-bottom: 15px; }
        .admin-btn { width: 100%; padding: 12px; background: #38bdf8; color: #0f172a; border: none; font-weight: 700; border-radius: 5px; cursor: pointer; }
        .close-link { color: #94a3b8; font-size: 13px; cursor: pointer; display: block; text-align: center; margin-top: 15px; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="glow"></div>

    <div id="admin-modal">
     <div class="admin-box">
            <h3>Add New Presentation</h3>
            <div class="admin-grid">
                <!-- Full width Repository Dropdown -->
                <div class="full">
                    <label>Target Repository</label>
                    <select id="target-repo" class="admin-input">
                        <option value="AI-in-MH">Repository One</option>
                    </select>
                </div>
                
                <!-- Date and Color -->
                <div><label>Date</label><input type="date" id="pres-date" class="admin-input"></div>
                <div style="display:flex; flex-direction:column;">
                    <label>Color</label>
                    <input type="color" id="pres-color" class="admin-input" value="#38bdf8" style="height:35px;">
                    <button type="button" class="admin-btn" style="padding: 2px; font-size: 10px;" onclick="randomizeColor()">Randomize</button>
                </div>
                
                <!-- Title -->
                <div class="full"><label>Presentation Title</label><input type="text" id="pres-title" class="admin-input" placeholder="Enter title..."></div>
                
                <!-- File Pickers -->
                <div><label>HTML File</label><input type="file" id="html-picker" class="admin-input"></div>
                <div><label>PDF File</label><input type="file" id="pdf-picker" class="admin-input"></div>
                
                <!-- Token -->
                <div class="full"><label>GitHub Token</label><input type="password" id="github-token" class="admin-input"></div>
            </div>
            <button class="admin-btn" onclick="processEntry()">Upload & Register</button>
            <span class="close-link" onclick="closeAdmin()">Cancel</span>
            <div id="status" style="margin-top:15px; font-size:12px; text-align:center;"></div>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>Research Archive</h1>
            <p><span class="secret-name" ondblclick="openAdmin()">Yekkaluru Divya Teja</span> • Master Directory</p>
        </div>
        <div class="timeline" id="timeline-list"></div>
    </div>

    <script>
        const GITHUB_USER = "divyateja050"; // <-- UPDATE THIS
        const MAIN_REPO = "divyateja050.github.io"; 
        
        async function loadTimeline() {
            const res = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${MAIN_REPO}/main/data.json?t=${Date.now()}`);
            const data = await res.json();
            document.getElementById('timeline-list').innerHTML = data.map(item => `
                <div class="timeline-item">
                    <div class="timeline-marker" style="border-color: ${item.color}"></div>
                    <div class="card">
                        <div><div class="date-tag" style="color: ${item.color}">${item.date}</div><h2>${item.title}</h2></div>
                        <div class="action-group">
                            <a href="${item.url}" target="_blank" class="btn btn-primary" style="background:${item.color}">Slides</a>
                            ${item.pdfUrl ? `<a href="${item.pdfUrl}" class="btn btn-outline" download>PDF</a>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function randomizeColor() {
            const colors = ['#38bdf8', '#a78bfa', '#f43f5e', '#10b981', '#f59e0b'];
            document.getElementById('pres-color').value = colors[Math.floor(Math.random() * colors.length)];
        }

        function openAdmin() { document.getElementById('admin-modal').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }

        async function processEntry() {
            const token = document.getElementById('github-token').value;
            const status = document.getElementById('status');
            const targetRepo = document.getElementById('target-repo').value;

            async function upload(file) {
                const reader = new FileReader();
                return new Promise(res => {
                    reader.onload = async (e) => {
                        const content = e.target.result.split(',')[1];
                        const name = file.name.replace(/\s+/g, '-').toLowerCase();
                        await fetch(`https://api.github.com/repos/${GITHUB_USER}/${targetRepo}/contents/${name}`, {
                            method: 'PUT',
                            headers: { 'Authorization': `token ${token}` },
                            body: JSON.stringify({ message: `Add ${name}`, content: content })
                        });
                        res(`https://${GITHUB_USER}.github.io/${targetRepo}/${name}`);
                    };
                    reader.readAsDataURL(file);
                });
            }

            status.innerText = "Uploading...";
            const htmlUrl = await upload(document.getElementById('html-picker').files[0]);
            const pdfUrl = document.getElementById('pdf-picker').files[0] ? await upload(document.getElementById('pdf-picker').files[0]) : null;

            const metaRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${MAIN_REPO}/contents/data.json`);
            const metaData = await metaRes.json();
            const currentDb = JSON.parse(atob(metaData.content));
            
            currentDb.unshift({ 
                date: document.getElementById('pres-date').value, 
                title: document.getElementById('pres-title').value, 
                url: htmlUrl, pdfUrl, 
                color: document.getElementById('pres-color').value 
            });

            await fetch(`https://api.github.com/repos/${GITHUB_USER}/${MAIN_REPO}/contents/data.json`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({ message: "Update DB", content: btoa(JSON.stringify(currentDb, null, 2)), sha: metaData.sha })
            });

            location.reload();
        }
        window.onload = loadTimeline;
    </script>
</body>
</html>
