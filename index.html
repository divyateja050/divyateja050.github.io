<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Archive | Yekkaluru Divya Teja</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CORE RESET */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; min-height: 100vh; display: flex; justify-content: center; background-image: radial-gradient(circle at top center, #1e293b, #0f172a); background-attachment: fixed; }
        .glow { position: fixed; width: 800px; height: 800px; background: radial-gradient(circle, rgba(56, 189, 248, 0.03) 0%, rgba(15, 23, 42, 0) 60%); top: 0; left: 50%; transform: translateX(-50%); z-index: 0; pointer-events: none; }
        .container { width: 100%; max-width: 1000px; padding: 60px 20px; z-index: 1; }
        .header { text-align: left; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .header h1 { font-size: 2.2rem; font-weight: 700; margin: 0 0 8px 0; color: #ffffff; }
        .header p { font-size: 1rem; color: #94a3b8; font-weight: 400; }
        
        /* SECRET NAME TRIGGER */
        .secret-name {
            cursor: text; /* Looks exactly like normal text when hovering */
            user-select: none; /* Prevents text from highlighting when double-clicked */
        }

        .timeline { position: relative; padding-left: 40px; }
        .timeline::before { content: ''; position: absolute; top: 0; bottom: 0; left: 11px; width: 2px; background: linear-gradient(to bottom, rgba(56, 189, 248, 0.5), rgba(255, 255, 255, 0.05) 90%); }
        .timeline-item { position: relative; margin-bottom: 20px; }
        .timeline-marker { position: absolute; left: -37px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; border-radius: 50%; background-color: #0f172a; border: 2px solid #38bdf8; box-shadow: 0 0 0 4px rgba(15, 23, 42, 1); transition: all 0.3s ease; z-index: 2; }
        .timeline-item:hover .timeline-marker { background-color: #38bdf8; box-shadow: 0 0 10px rgba(56, 189, 248, 0.6), 0 0 0 4px rgba(15, 23, 42, 1); }
        .card { background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 10px; padding: 20px 25px; transition: all 0.2s ease; position: relative; backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .timeline-item:hover .card { border-color: rgba(56, 189, 248, 0.3); background: rgba(30, 41, 59, 0.9); }
        .card-info { display: flex; flex-direction: column; justify-content: center; }
        .date-tag { font-size: 0.75rem; font-weight: 600; color: #38bdf8; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
        .card h2 { font-size: 1.15rem; font-weight: 600; color: #f8fafc; margin: 0; line-height: 1.3; }
        .action-group { display: flex; gap: 10px; flex-shrink: 0; }
        .btn { padding: 8px 16px; border-radius: 5px; font-size: 0.85rem; font-weight: 600; text-decoration: none; transition: all 0.2s ease; display: inline-flex; align-items: center; gap: 6px; }
        .btn svg { width: 14px; height: 14px; }
        .btn-primary { background-color: #0ea5e9; color: #ffffff; border: 1px solid #0ea5e9; }
        .btn-primary:hover { background-color: #0284c7; border-color: #0284c7; }
        .btn-outline { background-color: transparent; border: 1px solid rgba(255,255,255,0.15); color: #cbd5e1; }
        .btn-outline:hover { border-color: rgba(255,255,255,0.4); color: #ffffff; background-color: rgba(255,255,255,0.05); }

        /* SECRET ADMIN PANEL STYLES */
        #admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(5px); z-index: 10000; justify-content: center; align-items: center; }
        .admin-box { background: #1e293b; border: 1px solid #38bdf8; padding: 30px; border-radius: 12px; width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .admin-box h3 { margin: 0 0 20px 0; color: #38bdf8; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        .admin-input { width: 100%; padding: 10px; margin-bottom: 15px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 5px; }
        .admin-btn { width: 100%; padding: 10px; background: #38bdf8; color: #0f172a; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; margin-bottom: 10px; }
        .admin-btn:hover { background: #0ea5e9; }
        .close-btn { background: transparent; color: #ef4444; border: 1px solid #ef4444; }
        #status-msg { font-size: 0.85rem; margin-top: 10px; text-align: center; }

        @media (max-width: 768px) {
            .container { padding: 40px 20px; }
            .card { flex-direction: column; align-items: flex-start; }
            .action-group { width: 100%; margin-top: 10px; }
            .btn { flex: 1; justify-content: center; }
            .timeline-marker { top: 35px; transform: translateY(0); } 
        }
    </style>
</head>
<body>

    <div class="glow"></div>
    
    <!-- SECRET ADMIN UI -->
    <div id="admin-modal">
        <div class="admin-box">
            <h3>Repository Uploader</h3>
            
            <input type="text" id="repo-name" class="admin-input" placeholder="GitHub Repo (e.g. your-name/repo-name)">
            
            <label style="font-size: 12px; color: #94a3b8; margin-bottom: 5px; display:block;">File Name (e.g., presentation-3.html)</label>
            <input type="text" id="file-name" class="admin-input" placeholder="File name with extension">
            
            <label style="font-size: 12px; color: #94a3b8; margin-bottom: 5px; display:block;">Select File</label>
            <input type="file" id="file-picker" class="admin-input">
            
            <input type="password" id="github-token" class="admin-input" placeholder="GitHub Personal Access Token">
            
            <button class="admin-btn" onclick="uploadToGitHub()">Upload File to GitHub</button>
            <button class="admin-btn close-btn" onclick="closeAdmin()">Cancel</button>

            <div id="status-msg"></div>
        </div>
    </div>

    <div class="container">
        <!-- HEADER WITH SECRET TRIGGER ON NAME -->
        <div class="header">
            <h1>Research Archive</h1>
            <p><span class="secret-name" ondblclick="openAdmin()">Yekkaluru Divya Teja</span> • Master Presentation Directory</p>
        </div>

        <!-- TIMELINE LIST -->
        <div class="timeline">

            <!-- ITEM 1 -->
            <div class="timeline-item">
                <div class="timeline-marker"></div>
                <div class="card">
                    <div class="card-info">
                        <div class="date-tag">June 2026</div>
                        <h2>AI-Driven Tools for Detecting & Monitoring Mental Health</h2>
                    </div>
                    <div class="action-group">
                        <a href="presentation-1.html" class="btn btn-primary"> View Slides </a>
                    </div>
                </div>
            </div>

            <!-- ITEM 2 -->
            <div class="timeline-item">
                <div class="timeline-marker" style="border-color: #a78bfa;"></div>
                <div class="card">
                    <div class="card-info">
                        <div class="date-tag" style="color: #a78bfa;">May 2026</div>
                        <h2>Predictive Modeling in Mental Health Disorders</h2>
                    </div>
                    <div class="action-group">
                        <a href="presentation-2.html" class="btn btn-primary" style="background-color: #8b5cf6; border-color: #8b5cf6;"> View Slides </a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- ADMIN LOGIC -->
    <script>
        function openAdmin() {
            document.getElementById('admin-modal').style.display = 'flex';
        }

        function closeAdmin() {
            document.getElementById('admin-modal').style.display = 'none';
            document.getElementById('status-msg').innerText = '';
        }

        async function uploadToGitHub() {
            const repo = document.getElementById('repo-name').value;
            const path = document.getElementById('file-name').value;
            const token = document.getElementById('github-token').value;
            const fileInput = document.getElementById('file-picker');
            const statusMsg = document.getElementById('status-msg');

            if (!repo || !path || !token || !fileInput.files[0]) {
                statusMsg.style.color = '#ef4444';
                statusMsg.innerText = "Please fill out all fields.";
                return;
            }

            statusMsg.style.color = '#38bdf8';
            statusMsg.innerText = "Encoding file...";

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = async function(event) {
                const base64Content = event.target.result.split(',')[1];
                statusMsg.innerText = "Uploading to GitHub...";

                try {
                    const response = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: `Add ${path} via Admin Portal`,
                            content: base64Content
                        })
                    });

                    if (response.ok) {
                        statusMsg.style.color = '#10b981';
                        statusMsg.innerText = "Upload Successful! Give GitHub a minute to update.";
                        setTimeout(closeAdmin, 3000);
                    } else {
                        const err = await response.json();
                        statusMsg.style.color = '#ef4444';
                        statusMsg.innerText = "Error: " + err.message;
                    }
                } catch (error) {
                    statusMsg.style.color = '#ef4444';
                    statusMsg.innerText = "Upload failed. Check your internet or token.";
                }
            };

            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
